    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stoke&family=Calistoga&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/7bd80d0d31.js" crossorigin="anonymous"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0d0804;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(127, 73, 30, 0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(250, 193, 19, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 55% 100%, rgba(127, 73, 30, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1.25rem 4rem;
            font-family: 'Calistoga', cursive;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.35;
        }

        .links-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .back-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            min-height: 44px;
            padding: 0.5rem 0;
            color: rgba(250, 193, 19, 0.7);
            font-family: 'Calistoga', cursive;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            margin-bottom: 0.25rem;
            transition: color 0.15s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:hover { color: #FAC113; text-decoration: none; }
        .back-btn:active { color: #FAC113; opacity: 0.7; }

        .links-logo {
            width: 120px;
            margin-bottom: 0.5rem;
        }

        .page-heading {
            font-family: 'Calistoga', cursive;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: rgba(250, 193, 19, 0.55);
            margin-bottom: 1.25rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            width: 100%;
            min-height: 56px;
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            border: 2px solid #FAC113;
            background-color: transparent;
            color: #FAC113;
            font-family: 'Calistoga', cursive;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .link-btn:focus-visible {
            outline: 2px solid #FAC113;
            outline-offset: 3px;
        }

        .link-btn:active {
            background-color: rgba(250, 193, 19, 0.15);
            opacity: 0.85;
        }

        @media (hover: hover) {
            .link-btn:hover {
                text-decoration: none;
                color: #FAC113;
                background-color: rgba(250, 193, 19, 0.08);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(250, 193, 19, 0.2);
            }
        }

        .link-btn .platform-icon {
            font-size: 1.3rem;
            width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        /* Platform-specific accent colors — hover only on pointer devices */
        @media (hover: hover) {
            #link-spotify:hover  { border-color: #1DB954; color: #1DB954; box-shadow: 0 6px 20px rgba(29,185,84,0.2); }
            #link-instagram:hover{ border-color: #E1306C; color: #E1306C; box-shadow: 0 6px 20px rgba(225,48,108,0.2); }
            #link-tiktok:hover   { border-color: #69C9D0; color: #69C9D0; box-shadow: 0 6px 20px rgba(105,201,208,0.2); }
            #link-youtube:hover  { border-color: #FF0000; color: #FF0000; box-shadow: 0 6px 20px rgba(255,0,0,0.2); }
            #link-facebook:hover { border-color: #1877F2; color: #1877F2; box-shadow: 0 6px 20px rgba(24,119,242,0.2); }
            #link-twitter:hover  { border-color: #1DA1F2; color: #1DA1F2; box-shadow: 0 6px 20px rgba(29,161,242,0.2); }
        }

        .links-footer {
            margin-top: 2rem;
            text-align: center;
        }

        .links-footer a {
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Stoke', serif;
            font-size: 0.75rem;
            text-decoration: none;
            letter-spacing: 0.06em;
        }

        .links-footer a:hover {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <div class="links-container">

        <a href="/links.html" class="back-btn" aria-label="Back to Links">
            <i class="fas fa-chevron-left"></i> All Links
        </a>

        <a href="/" aria-label="Kahone Concept Home">
            <img src="assets/img/KC_Logo_Large_Yellow.svg" alt="Kahone Concept" class="links-logo" />
        </a>

        <p class="page-heading">Follow on Social Media</p>

        <a href="https://open.spotify.com/artist/6O4bbRzJEdKC8nSlaMaTz4" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-spotify">
            <span class="platform-icon"><i class="fab fa-spotify"></i></span>
            Spotify
        </a>

        <a href="https://www.instagram.com/kahoneconcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-instagram">
            <span class="platform-icon"><i class="fab fa-instagram"></i></span>
            Instagram
        </a>

        <a href="https://www.tiktok.com/@kahoneconcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-tiktok">
            <span class="platform-icon"><i class="fab fa-tiktok"></i></span>
            TikTok
        </a>

        <a href="https://www.youtube.com/c/KahoneConcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-youtube">
            <span class="platform-icon"><i class="fab fa-youtube"></i></span>
            YouTube
        </a>

        <a href="https://www.facebook.com/kahoneconcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-facebook">
            <span class="platform-icon"><i class="fab fa-facebook-f"></i></span>
            Facebook
        </a>

        <a href="https://www.twitter.com/kahoneconcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-twitter">
            <span class="platform-icon"><i class="fab fa-twitter"></i></span>
            Twitter / X
        </a>

        <div class="links-footer">
            <a href="/">kahoneconcept.com</a>
        </div>

    </div>

    <script>
    (function () {
        function fbEvent(name, params) {
            if (typeof fbq !== 'undefined') fbq('track', name, params || {});
        }
        function fbCustom(name, params) {
            if (typeof fbq !== 'undefined') fbq('trackCustom', name, params || {});
        }
        function gaEvent(name, params) {
            if (typeof gtag !== 'undefined') gtag('event', name, params || {});
        }

        var platforms = {
            'link-spotify':   'Spotify',
            'link-instagram': 'Instagram',
            'link-tiktok':    'TikTok',
            'link-youtube':   'YouTube',
            'link-facebook':  'Facebook',
            'link-twitter':   'Twitter'
        };

        Object.keys(platforms).forEach(function (id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('click', function () {
                var platform = platforms[id];
                fbCustom('SocialClick', { platform: platform });
                gaEvent('select_content', { content_type: 'social', content_id: platform.toLowerCase() });
            });
        });
    })();
    </script>

</body>
</html>
