<html lang="en">

<head>
    <meta charset="utf-8" />

    <link rel="canonical" href="https://www.kahoneconcept.com/links" />
    <link rel="icon" type="image/x-icon" href="assets/Kahone_Concept_Favicon.png" />
    <link rel="apple-touch-icon" href="assets/Kahone_Concept_Favicon.png" />

    <meta property="og:image" content="https://www.kahoneconcept.com/assets/img/photos/Ben_6.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stoke&family=Calistoga&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/7bd80d0d31.js" crossorigin="anonymous"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a0e06;
            background-image:
                linear-gradient(rgba(13, 8, 4, 0.68), rgba(13, 8, 4, 0.75)),
                url('/assets/img/links-bg.webp');
            background-size: cover;
            background-position: center top;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1.25rem 4rem;
            font-family: 'Calistoga', cursive;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.35;
        }

        .links-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            object-position: center center;
            border-radius: 50%;
            border: 3px solid #254F22;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 0.75rem;
        }

        .links-logo {
            width: 140px;
            margin-bottom: 1.5rem;
        }

        .link-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 56px;
            padding: 0.85rem 1.5rem;
            border-radius: 50px;
            text-align: center;
            text-decoration: none;
            border: 2px solid #254F22;
            transition: background-color 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            cursor: pointer;
            background: none;
            font-family: 'Calistoga', cursive;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .link-btn:focus-visible {
            outline: 2px solid #6EB062;
            outline-offset: 3px;
        }

        .link-btn:active {
            opacity: 0.75;
        }

        @media (hover: hover) {
            .link-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(37, 79, 34, 0.35);
                text-decoration: none;
            }
        }

        .link-btn-primary {
            background: linear-gradient(135deg, #d8d8d8 0%, #f4f4f4 20%, #9a9a9a 45%, #e8e8e8 65%, #b0b0b0 85%, #f0f0f0 100%);
            border-color: #254F22;
            color: #173015;
        }

        .link-btn-primary:hover, .link-btn-primary:focus-visible {
            filter: brightness(1.08);
            border-color: #AB4830;
            color: #173015;
        }

        .link-btn-primary:active {
            filter: brightness(0.92);
        }

        .link-btn-outline {
            background-color: transparent;
            color: #6EB062;
        }

        .link-btn-outline:active {
            background-color: rgba(110, 176, 98, 0.15);
        }

        .link-label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.65;
            margin-bottom: 0.15rem;
        }

        .link-title {
            display: block;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Mailing list expandable */
        .mailing-expand {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            border: 2px solid #254F22;
            border-radius: 16px;
            background: rgba(171, 72, 48, 0.2);
            margin-top: -0.25rem;
        }

        .mailing-expand.open {
            display: flex;
        }

        .mailing-expand input[type="email"] {
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 50px;
            border: 2px solid rgba(110, 176, 98, 0.5);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-family: 'Stoke', serif;
            font-size: 1rem; /* 16px minimum prevents iOS zoom */
            text-align: center;
            outline: none;
            -webkit-appearance: none;
        }

        .mailing-expand input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .mailing-expand input[type="email"]:focus {
            border-color: #6EB062;
            background: rgba(255, 255, 255, 0.1);
        }

        .mailing-expand button {
            width: 100%;
            padding: 0.65rem;
            border-radius: 50px;
            border: none;
            background-color: #254F22;
            color: #EEE0CC;
            font-family: 'Calistoga', cursive;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .mailing-expand button:hover {
            background-color: #2f6029;
        }

        .links-footer {
            margin-top: 2rem;
            text-align: center;
        }

        .links-footer a {
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Stoke', serif;
            font-size: 0.75rem;
            text-decoration: none;
            letter-spacing: 0.06em;
        }

        .links-footer a:hover {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <div class="links-container">

        <picture>
            <source srcset="/assets/img/profile.webp" type="image/webp">
            <img src="/assets/img/profile.jpg" alt="Kahone Concept" class="profile-img" loading="eager" />
        </picture>

        <a href="/" aria-label="Kahone Concept Home">
            <img src="/assets/img/KC_Logo_E.svg" alt="Kahone Concept" class="links-logo" />
        </a>

        <!-- Music -->
        <a href="/links-music"
           class="link-btn link-btn-primary" id="link-stream">
            <span class="link-label">Stream &amp; Download</span>
            <span class="link-title">Music</span>
        </a>

        <!-- Live Show -->
        <a href="https://www.wyep.org/wyep-programming/2026-05-01/summer-music-festival-michgander-ratboys"
           target="_blank" rel="noopener noreferrer"
           class="link-btn link-btn-outline" id="link-show">
            <span class="link-label">Live &mdash; Jun 27, 2026 &middot; 4:00 PM</span>
            <span class="link-title">WYEP Summer Music Festival</span>
        </a>

        <!-- Disco Dynomite Playlist -->
        <a href="https://open.spotify.com/playlist/1Le3cxYIMVme5SSbSajZmR?si=24c3b7b46d064f7e" target="_blank" rel="noopener noreferrer"
           class="link-btn link-btn-outline" id="link-disco-playlist">
            <span class="link-label">Spotify Playlist</span>
            <span class="link-title">Kahone's Disco Dynomite</span>
        </a>

        <!-- Social Media -->
        <a href="/links-socials" class="link-btn link-btn-outline" id="link-socials">
            <span class="link-label">Stay Connected</span>
            <span class="link-title">Follow on Social Media</span>
        </a>

        <!-- Merch -->
        <a href="https://kahone-concept-merch.creator-spring.com" target="_blank" rel="noopener noreferrer"
           class="link-btn link-btn-outline" id="link-merch">
            <span class="link-label">Official</span>
            <span class="link-title">Shop Merch</span>
        </a>

        <!-- Mailing List Toggle -->
        <button class="link-btn link-btn-outline" id="link-mailing" aria-expanded="false"
                onclick="toggleMailingList(this)">
            <span class="link-label">Stay in the Loop</span>
            <span class="link-title">Join the Mailing List</span>
        </button>

        <div class="mailing-expand" id="mailing-form" aria-hidden="true">
            <form action="https://app.kit.com/forms/5090078/subscriptions" method="post" target="_blank"
                  id="mailing-list-form">
                <input type="email" name="email_address" placeholder="Your email address" required />
                <button type="submit">Subscribe</button>
            </form>
        </div>

        <!-- Songs4Friends -->
        <a href="https://drive.google.com/drive/folders/1mgNB_rYst___4Mc1rb_aWW5mD4RGafsl" target="_blank" rel="noopener noreferrer"
           class="link-btn link-btn-outline" id="link-songs4friends">
            <span class="link-label">Free Download</span>
            <span class="link-title">Songs4Friends</span>
        </a>

        <!-- Contact -->
        <a href="/#contact" class="link-btn link-btn-outline" id="link-contact">
            <span class="link-label">Booking &amp; Press</span>
            <span class="link-title">Get in Touch</span>
        </a>

        <div class="links-footer">
            <a href="/">kahoneconcept.com</a>
        </div>

    </div>

    <!-- ConvertKit -->
    <script src="https://f.convertkit.com/ckjs/ck.5.js" async></script>

    <script>
    (function () {
        function fbEvent(name, params) {
            if (typeof fbq !== 'undefined') fbq('track', name, params || {});
        }
        function fbCustom(name, params) {
            if (typeof fbq !== 'undefined') fbq('trackCustom', name, params || {});
        }
        function gaEvent(name, params) {
            if (typeof gtag !== 'undefined') gtag('event', name, params || {});
        }

        // Stream Now
        document.getElementById('link-stream').addEventListener('click', function () {
            fbEvent('ViewContent', { content_name: 'The Greatest Hits', content_category: 'Music', content_type: 'product' });
            gaEvent('select_content', { content_type: 'music', content_id: 'the-greatest-hits' });
        });

        // Live Show
        document.getElementById('link-show').addEventListener('click', function () {
            fbEvent('ViewContent', { content_name: 'WYEP Summer Music Festival', content_category: 'Event' });
            gaEvent('select_content', { content_type: 'show', content_id: 'wyep-summer-2026' });
        });

        // Disco Dynomite Playlist
        document.getElementById('link-disco-playlist').addEventListener('click', function () {
            fbEvent('ViewContent', { content_name: "Kahone's Disco Dynomite", content_category: 'Playlist' });
            gaEvent('select_content', { content_type: 'playlist', content_id: 'disco-dynomite' });
        });

        // Social Media sub-page
        document.getElementById('link-socials').addEventListener('click', function () {
            fbCustom('SocialPageView');
            gaEvent('select_content', { content_type: 'nav', content_id: 'social-links-page' });
        });

        // Merch
        document.getElementById('link-merch').addEventListener('click', function () {
            fbEvent('InitiateCheckout', { content_name: 'Merch Store' });
            gaEvent('begin_checkout', { items: [{ item_name: 'Merch Store' }] });
        });

        // Mailing list open (only fires when opening, not closing)
        document.getElementById('link-mailing').addEventListener('click', function () {
            var isCurrentlyOpen = document.getElementById('mailing-form').classList.contains('open');
            if (!isCurrentlyOpen) {
                fbEvent('ViewContent', { content_name: 'Mailing List', content_category: 'Newsletter' });
                gaEvent('view_item', { items: [{ item_name: 'Mailing List Signup' }] });
            }
        });

        // Mailing list submit
        document.getElementById('mailing-list-form').addEventListener('submit', function () {
            fbEvent('CompleteRegistration', { content_name: 'Mailing List' });
            gaEvent('sign_up', { method: 'email' });
        });

        // Songs4Friends
        document.getElementById('link-songs4friends').addEventListener('click', function () {
            fbEvent('ViewContent', { content_name: 'Songs4Friends', content_category: 'Free Music' });
            gaEvent('select_content', { content_type: 'music', content_id: 'songs4friends' });
        });

        // Contact
        document.getElementById('link-contact').addEventListener('click', function () {
            fbCustom('ContactPageView');
            gaEvent('select_content', { content_type: 'nav', content_id: 'contact' });
        });
    })();

    function toggleMailingList(btn) {
        var form = document.getElementById('mailing-form');
        var isOpen = form.classList.contains('open');
        form.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
        form.setAttribute('aria-hidden', isOpen ? 'true' : 'false');
    }
    </script>

</body>
</html>
