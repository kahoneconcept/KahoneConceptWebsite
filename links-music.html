    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0d0804;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(127, 73, 30, 0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(250, 193, 19, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 55% 100%, rgba(127, 73, 30, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1.25rem 4rem;
            font-family: 'Calistoga', cursive;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.35;
        }

        .links-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .back-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            min-height: 44px;
            padding: 0.5rem 0;
            color: rgba(250, 193, 19, 0.7);
            font-family: 'Calistoga', cursive;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            margin-bottom: 0.25rem;
            transition: color 0.15s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:hover { color: #FAC113; text-decoration: none; }
        .back-btn:active { color: #FAC113; opacity: 0.7; }

        .album-art {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            margin-bottom: 0.75rem;
        }

        .album-title {
            font-family: 'Calistoga', cursive;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #FAC113;
            text-align: center;
        }

        .album-artist {
            font-family: 'Stoke', serif;
            font-size: 0.85rem;
            color: rgba(184, 211, 237, 0.8);
            text-align: center;
            margin-bottom: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            width: 100%;
            min-height: 56px;
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            border: 2px solid #FAC113;
            background-color: transparent;
            color: #FAC113;
            font-family: 'Calistoga', cursive;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .link-btn:focus-visible {
            outline: 2px solid #FAC113;
            outline-offset: 3px;
        }

        .link-btn:active {
            background-color: rgba(250, 193, 19, 0.15);
            opacity: 0.85;
        }

        @media (hover: hover) {
            .link-btn:hover {
                text-decoration: none;
                color: #FAC113;
                background-color: rgba(250, 193, 19, 0.08);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(250, 193, 19, 0.2);
            }
            #link-spotify:hover    { border-color: #1DB954; color: #1DB954; box-shadow: 0 6px 20px rgba(29,185,84,0.2); }
            #link-apple-music:hover{ border-color: #fc3c44; color: #fc3c44; box-shadow: 0 6px 20px rgba(252,60,68,0.2); }
            #link-deezer:hover     { border-color: #EF5466; color: #EF5466; box-shadow: 0 6px 20px rgba(239,84,102,0.2); }
            #link-youtube:hover    { border-color: #FF0000; color: #FF0000; box-shadow: 0 6px 20px rgba(255,0,0,0.2); }
            #link-soundcloud:hover { border-color: #FF5500; color: #FF5500; box-shadow: 0 6px 20px rgba(255,85,0,0.2); }
            #link-bandcamp:hover   { border-color: #1DA0C3; color: #1DA0C3; box-shadow: 0 6px 20px rgba(29,160,195,0.2); }
        }

        .platform-icon {
            font-size: 1.3rem;
            width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        .links-footer {
            margin-top: 2rem;
            text-align: center;

            color: rgba(255, 255, 255, 0.3);
            font-family: 'Stoke', serif;
            font-size: 0.75rem;
            text-decoration: none;
            letter-spacing: 0.06em;
        }

<body>
    <div class="links-container">

        <a href="/links.html" class="back-btn" aria-label="Back to Links">
            <i class="fas fa-chevron-left"></i> All Links
        </a>

        <picture>
            <source srcset="/assets/img/music/GREATEST_HITS-KAHONE.webp" type="image/webp">
            <img src="/assets/img/music/GREATEST_HITS-KAHONE.jpg" alt="The Greatest Hits" class="album-art" loading="lazy" />
        </picture>

        <p class="album-title">The Greatest Hits</p>
        <p class="album-artist">Kahone Concept</p>

        <a href="https://open.spotify.com/playlist/4Fo6nFS09x8q6h9ZCZ87Tt" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-spotify">
            <span class="platform-icon"><i class="fab fa-spotify"></i></span>
            Spotify
        </a>

        <a href="https://music.apple.com/us/artist/kahone-concept/1136755582" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-apple-music">
            <span class="platform-icon"><i class="fab fa-apple"></i></span>
            Apple Music
        </a>

        <a href="https://www.deezer.com/us/artist/11489166" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-deezer">
            <span class="platform-icon"><i class="fas fa-music"></i></span>
            Deezer
        </a>

        <a href="https://www.youtube.com/c/KahoneConcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-youtube">
            <span class="platform-icon"><i class="fab fa-youtube"></i></span>
            YouTube
        </a>

        <a href="https://soundcloud.com/kahoneconcept" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-soundcloud">
            <span class="platform-icon"><i class="fab fa-soundcloud"></i></span>
            SoundCloud
        </a>

        <a href="https://kahoneconcept.bandcamp.com" target="_blank" rel="noopener noreferrer"
           class="link-btn" id="link-bandcamp">
            <span class="platform-icon"><i class="fab fa-bandcamp"></i></span>
            Bandcamp
        </a>

        <div class="links-footer">
            <a href="/">kahoneconcept.com</a>
        </div>

    </div>

    <script>
    (function () {
        function fbEvent(name, params) {
            if (typeof fbq !== 'undefined') fbq('track', name, params || {});
        }
        function fbCustom(name, params) {
            if (typeof fbq !== 'undefined') fbq('trackCustom', name, params || {});
        }
        function gaEvent(name, params) {
            if (typeof gtag !== 'undefined') gtag('event', name, params || {});
        }

        var platforms = {
            'link-spotify':     'Spotify',
            'link-apple-music': 'Apple Music',
            'link-deezer':      'Deezer',
            'link-youtube':     'YouTube',
            'link-soundcloud':  'SoundCloud',
            'link-bandcamp':    'Bandcamp'
        };

        Object.keys(platforms).forEach(function (id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('click', function () {
                var platform = platforms[id];
                fbEvent('ViewContent', { content_name: 'The Greatest Hits', content_category: 'Music', content_type: platform });
                fbCustom('StreamClick', { platform: platform, album: 'The Greatest Hits' });
                gaEvent('select_content', { content_type: 'streaming', content_id: platform.toLowerCase().replace(' ', '-'), item_list_name: 'The Greatest Hits' });
            });
        });
    })();
    </script>

</body>
